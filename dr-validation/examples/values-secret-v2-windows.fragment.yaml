# Fragment for ~/values-secret.yaml (version 2.0 secrets list).
# Merge these entries before redeploy when using private Windows VM images
# (quay.io/martjack/*) on the fork's externalDataSources.
#
# Obtain real credential values from your team lead via private DM.
# NEVER commit populated values to git.

version: "2.0"
secrets:
  # Quay robot account — CDI pulls windows2k22 / windows2k25 DataVolumes from private registry
  - name: privatevm-credentials
    vaultPrefixes:
      - global
      - hub
    fields:
      - name: accessKeyId
        value: <quay-robot-username>
      - name: secretKey
        value: <quay-robot-token>

  # Pre-configured Windows golden image — local Administrator SSH password
  - name: windows-admin
    vaultPrefixes:
      - global
    fields:
      - name: password
        value: <windows-administrator-password>

  # Optional: HammerDB SQL Server install on Windows edge VMs (or export DR_VALIDATION_MSSQL_*)
  - name: mssql-hammerdb
    vaultPrefixes:
      - global
    fields:
      - name: sa_password
        value: <mssql-sa-password>
      - name: user
        value: hammerdb
      - name: password
        value: <mssql-app-password>
