---
# Cost-optimized AWS instance profile for ephemeral dev/test DR environments.
#
# BYOC mode note:
# With byoc: true in values-cluster-names.yaml, this file's compute/platform
# overrides are NOT applied to spoke clusters (the hub no longer provisions
# them via Hive). To use spot or metal instances on the spokes, set the
# compute section directly in the spoke install-config.yaml.bak files:
#
# compute:
# - name: worker
# replicas: 3
# platform:
# aws:
# type: c5n.metal # bare-metal required for KubeVirt /dev/kvm
# spotMarketOptions: {} # spot pricing � 2-min reclaim warning
#
# IMPORTANT:
# - Spot capacity can be reclaimed with a 2-minute warning.
# - Bare-metal instances (c5n.metal, c5.metal) are required for KubeVirt VM
# scheduling (/dev/kvm support).
# - Keep spot for non-production testing only unless your SLOs accept this risk.

