---
# Must be false so edge VMs get a cloud-init disk (user/password/SSH from Vault).
# Secrets still come from ~/values-secret.yaml via pattern load-secrets; do not set true unless
# you attach cloud-init another way (see dr-validation/examples/cloud-init-fragment.yaml).
disableExternalSecrets: false
waitForMetalNode: false

vmDefaults:
  accessMode: "ReadWriteMany"
  storageClassName: "ocs-storagecluster-ceph-rbd-virtualization"
  volumeMode: "Block"
  count: 1
  flavor: medium
  workload: server
  os: rhel9
  storage: 30Gi
  memory: 4Gi
  machineType: pc-q35-rhel8.4.0
  cores: 1
  sockets: 1
  threads: 1
  template: rhel9-server-medium
  sshsecret: secret/data/global/vm-ssh
  cloudinitsecret: secret/data/global/cloud-init
  sshpubkeyfield: publickey
  publishService: true
  extraLabels:
    drprotection: true
  # extraLabels is available for default extra labels to add to the virtualmachine
  # extraAnnotations is available for default extra labels to add to the virtualmachine
  ports:
    - name: ssh
      port: 22
      protocol: TCP
      targetPort: 22

vms:
  edgenode:
    count: 4
    role: node

  # Windows Server 2022 VM � requires a Windows image in a container registry.
  # The DataVolume (50 Gi) is pulled once and stored in ODF; subsequent VMs
  # clone from that DataSource so the image is only downloaded once per cluster.
  # Set count: 0 to disable without removing the configuration.
  #
  # windows:
  #   count: 1
  #   role: desktop
  #   os: windows2k22
  #   dataSource: windows2k22 # references externalDataSources below
  #   efi: true # Windows requires UEFI boot
  #   mainDiskStorageBus: sata # virtio disk driver not available on bare Windows
  #   storage: 50Gi
  #   memory: 8Gi
  #   cores: 2
  #   template: windows2k22-server-medium
  #   ports:
  #     - name: rdp
  #       port: 3389
  #       protocol: TCP
  #       targetPort: 3389

# Uncomment once you have a Windows container image available in a registry
# and have added the privatevm-credentials secret to ~/values-secret.yaml.
#
# externalDataSources:
#   windows2k22:
#     name: windows2k22
#     type: registry
#     url: 'docker://<REGISTRY>/<REPO>:<TAG>'
#     registryCredentialsSecret: windows-registry-creds
#     size: 50G
#
# registryCredentialExternalSecrets:
#   windows-registry-creds:
#     vaultKey: secret/data/global/privatevm-credentials
